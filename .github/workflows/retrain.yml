name: Retrain pipeline

# Trigger on:
#   * any change under data/raw/** or pipeline code (so committing a new CSV
#     immediately retrains the model)
#   * a manual workflow_dispatch from the Actions tab
on:
  push:
    branches: [main]
    paths:
      - "data/raw/**"
      - "params.yaml"
      - "dvc.yaml"
      - "src/fraud_detection/**"
  workflow_dispatch:
    inputs:
      promote:
        description: "Promote candidate to Production if it wins the F1 gate"
        required: false
        default: "true"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  retrain:
    name: DVC repro + promote
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Configure DVC remote auth (DagsHub)
        # DVC uses the http remote on DagsHub; basic auth is sourced from secrets.
        env:
          DVC_REMOTE: origin
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc remote modify --local "$DVC_REMOTE" auth basic || true
          dvc remote modify --local "$DVC_REMOTE" user "$DAGSHUB_USERNAME"
          dvc remote modify --local "$DVC_REMOTE" password "$DAGSHUB_TOKEN"

      - name: DVC pull (data + models cache)
        run: dvc pull --allow-missing
        continue-on-error: true

      - name: Run pipeline (dvc repro)
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB: ${{ secrets.MONGODB_DB }}
          MONGODB_COLLECTION: ${{ secrets.MONGODB_COLLECTION }}
          # Promotion knobs — adjustable per-run via workflow_dispatch.
          PROMOTION_METRIC: ${{ vars.PROMOTION_METRIC || 'f1' }}
          PROMOTION_MIN_DELTA: ${{ vars.PROMOTION_MIN_DELTA || '0.0' }}
        run: dvc repro

      - name: Push DVC artefacts back to DagsHub
        if: success()
        run: dvc push

      - name: Upload reports as build artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-reports
          path: |
            reports/metrics.json
            reports/promotion.json
          if-no-files-found: ignore
